version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  peggy-api:
    build:
      context: ./services/peggy-api
      dockerfile: Dockerfile
    container_name: peggy-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - SQLITE_DB=/app/data/peggy.db
      - CORS_ORIGINS=http://localhost:3000
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NCBI_EMAIL=${NCBI_EMAIL:-peggy@example.com}
      - NCBI_API_KEY=${NCBI_API_KEY:-}
    depends_on:
      - qdrant
    volumes:
      - ./services/peggy-api:/app
      - peggy_data:/app/data

volumes:
  qdrant_data:
  peggy_data:
